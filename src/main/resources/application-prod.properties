# ─────────────────────────────────────────────────────────────────────────────
#  Production Profile — activated via SPRING_PROFILES_ACTIVE=prod
# ─────────────────────────────────────────────────────────────────────────────

# Stricter DDL in production — swap to 'validate' once schema is stable
spring.jpa.hibernate.ddl-auto=update

# Disable SQL logging completely in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Reduce log verbosity
logging.level.com.hospital.hms=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.root=WARN

# Structured logging for Railway log aggregation
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} : %msg%n
