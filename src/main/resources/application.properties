# ─────────────────────────────────────────────────────────────────────────────
#  Hospital Management System — Application Configuration
#  All secrets/credentials must be supplied via environment variables.
#  DO NOT commit real values — use .env.example as a reference.
# ─────────────────────────────────────────────────────────────────────────────
spring.application.name=hospital-management-system

# ── Server Port (Railway injects PORT automatically) ─────────────────────────
server.port=${PORT:8080}

# ── MySQL Database ────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning (Railway free tier)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── JWT ───────────────────────────────────────────────────────────────────────
# REQUIRED: Set JWT_SECRET env var to a Base64-encoded secret (min 256 bits)
# Generate one: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tZW52aXJvbm1lbnQ=}
# Token validity: 24 hours (milliseconds)
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ── CORS ──────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed origins (set FRONTEND_URL in production)
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:3000}

# ── Razorpay ──────────────────────────────────────────────────────────────────
app.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_Sujury3EFEfnTX}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:zQA8CNyYzZ72XwLLwAWpi796}

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.hospital.hms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── Actuator ────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.db.enabled=false
