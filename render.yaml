# ─────────────────────────────────────────────────────────────────────────────
#  Render Blueprint — Apex Hospital Management System
#  Deploys:
#    1. apex-hms-backend  — Spring Boot (Docker Web Service)
#
#  Frontend is deployed separately on Vercel (hms-frontend/)
#  Docs: https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Spring Boot Backend (Docker) ─────────────────────────────────────────
  - type: web
    name: apex-hms-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore          # Change to: oregon, ohio, frankfurt, virginia
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_URL
        sync: false            # jdbc:mysql://HOST:PORT/defaultdb?useSSL=true&...
      - key: DB_USERNAME
        sync: false            # avnadmin
      - key: DB_PASSWORD
        sync: false            # Your Aiven password
      - key: JWT_SECRET
        sync: false            # Base64 encoded secret
      - key: FRONTEND_URL
        sync: false            # Set to your Vercel URL: https://your-app.vercel.app
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_EXPIRATION
        value: "86400000"
